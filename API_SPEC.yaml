openapi: "3.1.0"
info:
  title: GroceryOS API
  version: "1.0.0"
  description: |
    Production-grade grocery e-commerce REST API.
    All admin endpoints require `x-admin-token` header.
    Customer endpoints use `x-session-token` or email verification.
  contact:
    name: GroceryOS Support
    email: support@groceryos.example.com
  license:
    name: Proprietary

servers:
  - url: https://groceryos.example.com/api
    description: Production
  - url: http://localhost:3001/api
    description: Local Development

tags:
  - name: Products
  - name: Orders
  - name: Customers
  - name: Auth
  - name: Payments
  - name: Loyalty
  - name: Inventory
  - name: Reports
  - name: Marketing

components:
  securitySchemes:
    AdminToken:
      type: apiKey
      in: header
      name: x-admin-token
    SessionToken:
      type: apiKey
      in: header
      name: x-session-token

  schemas:
    Product:
      type: object
      properties:
        id:          { type: integer }
        name:        { type: string }
        category:    { type: string }
        price:       { type: number }
        wasPrice:    { type: number, nullable: true }
        stock:       { type: number }
        unit:        { type: string }
        image:       { type: string, nullable: true }
        barcode:     { type: string, nullable: true }
        description: { type: string, nullable: true }
        enabled:     { type: boolean }
        featured:    { type: boolean }

    Order:
      type: object
      properties:
        id:         { type: integer }
        customerId: { type: integer }
        status:     { type: string, enum: [new,processing,dispatched,delivered,cancelled,refunded] }
        total:      { type: number }
        items:      { type: string, description: JSON array of order items }
        address:    { type: string, nullable: true }
        createdAt:  { type: string, format: date-time }

    Customer:
      type: object
      properties:
        id:       { type: integer }
        name:     { type: string }
        email:    { type: string, format: email }
        phone:    { type: string }
        address:  { type: string, nullable: true }
        orders:   { type: integer }
        blocked:  { type: boolean }

    Coupon:
      type: object
      properties:
        code:         { type: string }
        type:         { type: string, enum: [percent, fixed, free_shipping] }
        value:        { type: number }
        minOrderValue:{ type: number }
        maxUses:      { type: integer, nullable: true }
        expiresAt:    { type: string, format: date-time, nullable: true }
        active:       { type: boolean }

    Error:
      type: object
      properties:
        error: { type: string }

paths:
  # ─── Products ──────────────────────────────────────────────────────────────
  /products:
    get:
      tags: [Products]
      summary: List products
      parameters:
        - { name: category, in: query, schema: { type: string } }
        - { name: enabled, in: query, schema: { type: boolean } }
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: limit, in: query, schema: { type: integer, default: 20, maximum: 100 } }
      responses:
        "200": { description: Product list, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/Product" } } } } }
    post:
      tags: [Products]
      summary: Create product (admin)
      security: [{ AdminToken: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/Product" }
      responses:
        "201": { description: Created }
        "401": { description: Unauthorised, content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } } }

  /search:
    get:
      tags: [Products]
      summary: Full-text product search with facets
      parameters:
        - { name: q, in: query, schema: { type: string }, description: Search query }
        - { name: category, in: query, schema: { type: string } }
        - { name: minPrice, in: query, schema: { type: number } }
        - { name: maxPrice, in: query, schema: { type: number } }
        - { name: onSale, in: query, schema: { type: boolean } }
        - { name: inStock, in: query, schema: { type: boolean } }
        - { name: sortBy, in: query, schema: { type: string, enum: [price_asc,price_desc,name_asc,newest,featured] } }
        - { name: page, in: query, schema: { type: integer, default: 1 } }
        - { name: limit, in: query, schema: { type: integer, default: 20 } }
        - { name: suggest, in: query, schema: { type: boolean }, description: Return autocomplete suggestions }
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  results: { type: array, items: { $ref: "#/components/schemas/Product" } }
                  total:   { type: integer }
                  page:    { type: integer }
                  pages:   { type: integer }
                  facets:  { type: object }

  # ─── Orders ────────────────────────────────────────────────────────────────
  /orders:
    get:
      tags: [Orders]
      summary: List orders (admin)
      security: [{ AdminToken: [] }]
      parameters:
        - { name: status, in: query, schema: { type: string } }
        - { name: page, in: query, schema: { type: integer } }
      responses:
        "200": { description: Order list }

  /orders/track:
    get:
      tags: [Orders]
      summary: Track order (public)
      parameters:
        - { name: orderId, in: query, schema: { type: integer }, required: true }
        - { name: phone, in: query, schema: { type: string }, description: Customer phone for verification }
      responses:
        "200": { description: Order tracking info with timeline }
        "403": { description: Phone does not match }
        "404": { description: Order not found }

  /orders/invoice:
    get:
      tags: [Orders]
      summary: Generate VAT invoice (HTML/PDF)
      parameters:
        - { name: orderId, in: query, schema: { type: integer }, required: true }
        - { name: phone, in: query, schema: { type: string } }
      responses:
        "200": { description: HTML invoice, content: { text/html: {} } }

  # ─── Auth ──────────────────────────────────────────────────────────────────
  /auth:
    post:
      tags: [Auth]
      summary: Customer login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                phone:    { type: string }
                password: { type: string }
      responses:
        "200": { description: Login successful }
        "401": { description: Invalid credentials }
        "423": { description: Account locked }

  /auth/admin:
    post:
      tags: [Auth]
      summary: Admin OTP login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username: { type: string }
                password: { type: string }
      responses:
        "200": { description: OTP sent to admin email }
        "401": { description: Invalid credentials }

  # ─── Payments ──────────────────────────────────────────────────────────────
  /payments/stripe:
    put:
      tags: [Payments]
      summary: Create Stripe Payment Intent (3D Secure / SCA)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:        { type: number }
                currency:      { type: string, default: gbp }
                orderId:       { type: integer }
                customerEmail: { type: string, format: email }
      responses:
        "200": { description: Payment intent with clientSecret }

  /payments/paypal:
    post:
      tags: [Payments]
      summary: Create PayPal order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:  { type: number }
                orderId: { type: integer }
      responses:
        "200": { description: PayPal order with approvalUrl }

  /payments/klarna:
    post:
      tags: [Payments]
      summary: Create Klarna BNPL session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                amount:  { type: number }
                orderId: { type: integer }
                email:   { type: string, format: email }
      responses:
        "200": { description: Klarna client token }

  /payments/split:
    post:
      tags: [Payments]
      summary: Split payment across multiple methods
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                orderId:  { type: integer }
                total:    { type: number }
                payments: { type: array, items: { type: object, properties: { method: { type: string }, amount: { type: number }, ref: { type: string } } } }
      responses:
        "200": { description: Payment breakdown results }

  # ─── Loyalty ───────────────────────────────────────────────────────────────
  /loyalty:
    get:
      tags: [Loyalty]
      summary: Get loyalty points balance
      parameters:
        - { name: email, in: query, schema: { type: string, format: email }, required: true }
      responses:
        "200": { description: Points balance, tier, and transactions }
    post:
      tags: [Loyalty]
      summary: Award or redeem loyalty points
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                action:     { type: string, enum: [award, redeem] }
                email:      { type: string }
                orderId:    { type: integer }
                orderTotal: { type: number }
                pointsToUse: { type: integer }
      responses:
        "200": { description: Points updated }

  # ─── Reports ───────────────────────────────────────────────────────────────
  /reports/sales:
    get:
      tags: [Reports]
      summary: Sales report (admin)
      security: [{ AdminToken: [] }]
      parameters:
        - { name: period, in: query, schema: { type: string, enum: [day,week,month,year], default: month } }
      responses:
        "200": { description: Revenue, VAT, top products, low stock }

  /reports/inventory:
    get:
      tags: [Reports]
      summary: Inventory valuation report (admin)
      security: [{ AdminToken: [] }]
      responses:
        "200": { description: Stock value, margins by SKU and category }

  /reports/customers:
    get:
      tags: [Reports]
      summary: Customer analytics — CLV, RFM segments (admin)
      security: [{ AdminToken: [] }]
      responses:
        "200": { description: Customer lifetime value and segments }

  # ─── Marketing ─────────────────────────────────────────────────────────────
  /newsletter:
    post:
      tags: [Marketing]
      summary: Subscribe to newsletter
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:       { type: string, format: email }
                name:        { type: string }
                preferences: { type: array, items: { type: string } }
      responses:
        "201": { description: Subscribed }
    delete:
      tags: [Marketing]
      summary: Unsubscribe (GDPR)
      parameters:
        - { name: email, in: query, schema: { type: string }, required: true }
      responses:
        "200": { description: Unsubscribed }

  /affiliates:
    get:
      tags: [Marketing]
      summary: List affiliates (admin) or check code (public)
      parameters:
        - { name: code, in: query, schema: { type: string } }
      responses:
        "200": { description: Affiliate data }
    post:
      tags: [Marketing]
      summary: Create affiliate (admin)
      security: [{ AdminToken: [] }]
      responses:
        "201": { description: Affiliate created }
