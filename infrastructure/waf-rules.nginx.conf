# ═══════════════════════════════════════════════════════════════════════════════
# GroceryOS WAF Rules — nginx + ModSecurity / Cloudflare WAF
# FIXED LOW: WAF configuration for rate limiting, geo-blocking, and OWASP rules
# ═══════════════════════════════════════════════════════════════════════════════

# ── Section 1: nginx rate limiting zones ─────────────────────────────────────
# Place in nginx.conf → http {} block

limit_req_zone $binary_remote_addr zone=api_general:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=api_auth:10m    rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_payment:10m rate=20r/m;
limit_req_zone $binary_remote_addr zone=api_search:10m  rate=120r/m;
limit_req_zone $binary_remote_addr zone=static:10m      rate=300r/m;

# ── Section 2: server block configuration ────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name groceryos.example.com;

    # TLS hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA512:DHE-RSA-AES256-GCM-SHA512:ECDHE-RSA-AES256-GCM-SHA384:DHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Add HSTS (redundant with app but belt+suspenders)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Block common attack patterns
    location ~* \.(php|asp|aspx|cgi|sh|bash)$ {
        return 403;
    }

    # Rate limit auth endpoints aggressively
    location /api/auth {
        limit_req zone=api_auth burst=5 nodelay;
        limit_req_status 429;
        add_header X-RateLimit-Limit "10" always;
        proxy_pass http://groceryos-api:3000;
    }

    # Rate limit payment endpoints
    location /api/payments {
        limit_req zone=api_payment burst=10 nodelay;
        limit_req_status 429;
        add_header X-RateLimit-Limit "20" always;
        proxy_pass http://groceryos-api:3000;
    }

    # Rate limit MFA
    location /api/mfa {
        limit_req zone=api_auth burst=3 nodelay;
        limit_req_status 429;
        proxy_pass http://groceryos-api:3000;
    }

    # General API rate limit
    location /api/ {
        limit_req zone=api_general burst=30 nodelay;
        limit_req_status 429;
        add_header X-RateLimit-Limit "60" always;
        proxy_pass http://groceryos-api:3000;
    }

    # Static assets — no rate limit needed
    location /_next/static/ {
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        proxy_pass http://groceryos-api:3000;
    }

    # Block known bad user agents
    if ($http_user_agent ~* "(sqlmap|nikto|nessus|masscan|nuclei|zgrab|python-requests/2\.0|curl/7\.19)") {
        return 403;
    }

    # Block requests with suspicious query strings
    set $block_sql_injections 0;
    if ($query_string ~* "union.*select.*\(") { set $block_sql_injections 1; }
    if ($query_string ~* "(<|%3C).*script.*(>|%3E)") { set $block_sql_injections 1; }
    if ($query_string ~* "select.*from.*information_schema") { set $block_sql_injections 1; }
    if ($block_sql_injections = 1) { return 403; }

    # Proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Size limits — prevent large payload attacks
    client_max_body_size 10M;
    client_body_timeout 30s;
    client_header_timeout 30s;

    # Hide nginx version
    server_tokens off;
}

# ── Section 3: Cloudflare WAF Rules (Terraform / API format) ─────────────────
# Deploy via: cloudflare_ruleset resource or Cloudflare Dashboard

# Rule 1: Block SQL injection attempts
# Expression: (http.request.uri.query contains "union select") or 
#             (http.request.uri.query contains "information_schema")
# Action: BLOCK

# Rule 2: Rate limit auth endpoint
# Expression: (http.request.uri.path eq "/api/auth")
# Action: RATE_LIMIT — 10 requests per 60 seconds per IP

# Rule 3: Challenge suspicious countries (adjust to your business)
# Expression: (ip.geoip.country in {"KP" "IR" "CU"})
# Action: MANAGED_CHALLENGE

# Rule 4: Block empty/bot User-Agents
# Expression: (http.user_agent eq "") or 
#             (http.user_agent matches "^(sqlmap|nikto|masscan)")
# Action: BLOCK

# Rule 5: Enable OWASP Core Rule Set
# Managed Rules → Cloudflare OWASP Core Ruleset → Sensitivity HIGH

