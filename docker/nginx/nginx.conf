events {
    worker_connections 1024;
}

http {
    # ── Rate Limiting (G-002, G-003, OWASP) ─────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m    rate=1r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m   rate=5r/m;
    limit_req_zone $binary_remote_addr zone=checkout_limit:10m rate=10r/m;
    limit_req_zone $http_x_forwarded_for zone=global:10m     rate=2r/s;

    # ── WAF: Block common attack patterns (G-043) ───────────────────────────
    map $request_uri $is_suspicious {
        default 0;
        ~*(\.\./|\.\.\\)               1;  # Path traversal
        ~*(union|select|insert|delete) 1;  # SQL injection
        ~*(<script|javascript:)        1;  # XSS
        ~*(\%00|\%0a|\%0d)             1;  # Null bytes / CRLF
        ~*(etc/passwd|/proc/self)      1;  # LFI
        ~*(wp-admin|phpmyadmin)        1;  # Scanner noise
    }

    # ── Block bad user agents ────────────────────────────────────────────────
    map $http_user_agent $blocked_ua {
        default          0;
        ~*sqlmap         1;
        ~*nikto          1;
        ~*nessus         1;
        ~*masscan        1;
        ~*zgrab          1;
    }

    # ── Upstream (Next.js) ───────────────────────────────────────────────────
    upstream nextjs {
        server app:3001;
        keepalive 32;
    }

    server {
        listen 80;
        server_name groceryos.example.com;

        # Force HTTPS (HSTS G-009)
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl http2;
        server_name groceryos.example.com;

        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_stapling        on;
        ssl_stapling_verify on;
        ssl_trusted_certificate /etc/nginx/ssl/chain.pem;
        resolver 8.8.8.8 8.8.4.4 valid=300s;
        resolver_timeout 5s;

        # ── Security headers (G-009, G-010) ─────────────────────────────────
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(self)" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://js.stripe.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https://api.stripe.com; frame-src https://js.stripe.com;" always;

        # ── WAF: Block attacks ───────────────────────────────────────────────
        if ($is_suspicious)   { return 403; }
        if ($blocked_ua)      { return 403; }

        # ── Request size limit (G-043) ────────────────────────────────────
        client_max_body_size 10m;

        # ── API Rate Limiting ────────────────────────────────────────────────
        location /api/auth {
            limit_req zone=auth_limit burst=3 nodelay;
            limit_req_status 429;
            proxy_pass http://nextjs;
            include /etc/nginx/proxy_params;
        }

        location /api/checkout {
            limit_req zone=checkout_limit burst=5 nodelay;
            limit_req_status 429;
            proxy_pass http://nextjs;
            include /etc/nginx/proxy_params;
        }

        location /api/ {
            limit_req zone=api_limit burst=30 nodelay;
            limit_req_status 429;
            proxy_pass http://nextjs;
            include /etc/nginx/proxy_params;
        }

        # ── Block access to sensitive paths ──────────────────────────────────
        location ~ /\. { deny all; return 404; }
        location ~ /(\.env|prisma/dev\.db) { deny all; return 404; }

        # ── Static assets with caching (G-077) ───────────────────────────────
        location /_next/static/ {
            proxy_pass http://nextjs;
            add_header Cache-Control "public, max-age=31536000, immutable";
            proxy_cache_valid 200 1d;
        }

        # ── Main app ──────────────────────────────────────────────────────────
        location / {
            proxy_pass http://nextjs;
            include /etc/nginx/proxy_params;
        }

        # ── Health check (no rate limit) ──────────────────────────────────────
        location /api/health {
            proxy_pass http://nextjs;
            access_log off;
        }
    }

    # ── Proxy parameters ──────────────────────────────────────────────────────
    # Save as /etc/nginx/proxy_params:
    # proxy_http_version 1.1;
    # proxy_set_header Upgrade $http_upgrade;
    # proxy_set_header Connection "upgrade";
    # proxy_set_header Host $host;
    # proxy_set_header X-Real-IP $remote_addr;
    # proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # proxy_set_header X-Forwarded-Proto $scheme;
    # proxy_read_timeout 60s;
}
