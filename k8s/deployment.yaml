apiVersion: apps/v1
# GroceryOS Kubernetes Deployment (GAP-150)
# Helm chart: helm install groceryos ./helm/groceryos

---
kind: Namespace
apiVersion: v1
metadata:
  name: groceryos
  labels:
    name: groceryos

---
# ── Application Deployment (blue-green ready) ─────────────────────────────────
kind: Deployment
apiVersion: apps/v1
metadata:
  name: groceryos-app
  namespace: groceryos
  labels:
    app: groceryos
    version: blue
spec:
  replicas: 3
  selector:
    matchLabels:
      app: groceryos
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge:       1
      maxUnavailable: 0  # Zero-downtime deployments (GAP-155)
  template:
    metadata:
      labels:
        app: groceryos
        version: blue
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values: [groceryos]
                topologyKey: kubernetes.io/hostname
      containers:
        - name: app
          image: ghcr.io/groceryos/groceryos:latest
          ports:
            - containerPort: 3001
          env:
            - name: NODE_ENV
              value: production
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: groceryos-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: groceryos-secrets
                  key: redis-url
            - name: ADMIN_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: groceryos-secrets
                  key: admin-api-token
          resources:
            requests:
              cpu:    "250m"
              memory: "512Mi"
            limits:
              cpu:    "1000m"
              memory: "1Gi"
          livenessProbe:
            httpGet:
              path: /api/health?type=health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds:       20
            failureThreshold:    3
          readinessProbe:
            httpGet:
              path: /api/health?type=health
              port: 3001
            initialDelaySeconds: 5
            periodSeconds:       10
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem:   true
            runAsNonRoot:             true
            runAsUser:                1001

---
# ── Service ───────────────────────────────────────────────────────────────────
kind: Service
apiVersion: v1
metadata:
  name: groceryos-service
  namespace: groceryos
spec:
  selector:
    app: groceryos
  ports:
    - protocol: TCP
      port:       80
      targetPort: 3001

---
# ── Horizontal Pod Autoscaler (GAP-032) ──────────────────────────────────────
kind: HorizontalPodAutoscaler
apiVersion: autoscaling/v2
metadata:
  name: groceryos-hpa
  namespace: groceryos
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind:       Deployment
    name:       groceryos-app
  minReplicas: 3
  maxReplicas: 20
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type:               Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type:               Utilization
          averageUtilization: 80

---
# ── Ingress with TLS (GAP-114, GAP-043) ──────────────────────────────────────
kind: Ingress
apiVersion: networking.k8s.io/v1
metadata:
  name: groceryos-ingress
  namespace: groceryos
  annotations:
    kubernetes.io/ingress.class:              nginx
    cert-manager.io/cluster-issuer:          letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
      add_header X-Frame-Options DENY always;
      add_header X-Content-Type-Options nosniff always;
spec:
  tls:
    - hosts:
        - groceryos.example.com
      secretName: groceryos-tls
  rules:
    - host: groceryos.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: groceryos-service
                port:
                  number: 80

---
# ── Network Policy (PCI-DSS Req 1 — GAP-189) ─────────────────────────────────
kind: NetworkPolicy
apiVersion: networking.k8s.io/v1
metadata:
  name: groceryos-netpol
  namespace: groceryos
spec:
  podSelector:
    matchLabels:
      app: groceryos
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 3001
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              name: groceryos
      ports:
        - port: 5432  # PostgreSQL
        - port: 6379  # Redis
    - to: []          # Allow external HTTPS (Stripe, Resend etc)
      ports:
        - protocol: TCP
          port: 443

---
# ── PodDisruptionBudget (high availability) ────────────────────────────────────
kind: PodDisruptionBudget
apiVersion: policy/v1
metadata:
  name: groceryos-pdb
  namespace: groceryos
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: groceryos
